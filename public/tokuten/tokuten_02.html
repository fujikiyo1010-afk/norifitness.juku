/* =============================================
   UI生成
   ============================================= */
function buildUI(){
  var container = document.getElementById('catList');
  CATS.forEach(function(cat){
    var catItems = DATA.filter(function(d){return d.category===cat.name;});
    var catBlock = document.createElement('div');
    catBlock.className = 'cat-block';
    catBlock.innerHTML =
      '<div class="cat-head" onclick="toggleCat(this)">' +
        '<div class="cat-icon">' + cat.icon + '</div>' +
        '<div class="cat-info">' +
          '<div class="cat-name">' + cat.name + '</div>' +
          '<div class="cat-desc">' + cat.desc + '</div>' +
        '</div>' +
        '<div class="cat-meta">' +
          '<span class="cat-count">' + catItems.length + '本</span>' +
          '<div class="cat-arr"><svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg></div>' +
        '</div>' +
      '</div>' +
      '<div class="cat-body"><div id="sub_' + cat.name + '"></div></div>';
    container.appendChild(catBlock);

    var subContainer = document.getElementById('sub_' + cat.name);
    cat.subs.forEach(function(sub){
      var subItems = catItems.filter(function(d){return d.subcategory===sub;});
      if(subItems.length === 0) return;
      var subBlock = document.createElement('div');
      subBlock.className = 'sub-block';
      var listHTML = subItems.map(function(item){
        var tagHTML = '';
        if(item.tag==='人気') tagHTML = '<span class="tag tag-pop">人気</span>';
        else if(item.tag==='初心者おすすめ') tagHTML = '<span class="tag tag-new">初心者</span>';
        return '<a class="pdf-item" href="' + item.url + '" target="_blank">' +
          '<div class="pdf-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>' +
          '<div class="pdf-title">' + item.title + '</div>' +
          '<div class="pdf-tags">' + tagHTML + '</div>' +
          '</a>';
      }).join('');
      subBlock.innerHTML =
        '<div class="sub-head" onclick="toggleSub(this)">' +
          '<div class="sub-name">' + sub + '</div>' +
          '<div class="sub-right">' +
            '<span class="sub-count">' + subItems.length + '本</span>' +
            '<div class="sub-arr"><svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg></div>' +
          '</div>' +
        '</div>' +
        '<div class="sub-body"><div class="pdf-list">' + listHTML + '</div></div>';
      subContainer.appendChild(subBlock);
    });
  });
}

function toggleCat(el){
  el.parentElement.classList.toggle('open');
}
function toggleSub(el){
  el.parentElement.classList.toggle('open');
}

/* =============================================
   検索
   ============================================= */
function doSearch(val){
  var q = val.trim();
  var resultsWrap = document.getElementById('searchResults');
  var catList = document.getElementById('catList');
  var srList = document.getElementById('srList');
  var srEmpty = document.getElementById('srEmpty');

  if(q === ''){
    resultsWrap.classList.remove('active');
    catList.style.display = '';
    return;
  }
  catList.style.display = 'none';
  resultsWrap.classList.add('active');
  srList.innerHTML = '';

  var hits = DATA.filter(function(d){
    return d.title.indexOf(q) !== -1 || d.subcategory.indexOf(q) !== -1 || d.category.indexOf(q) !== -1;
  });

  if(hits.length === 0){
    srEmpty.style.display = 'block';
  } else {
    srEmpty.style.display = 'none';
    hits.forEach(function(item){
      var a = document.createElement('a');
      a.className = 'sr-item';
      a.href = item.url;
      a.target = '_blank';
      a.innerHTML =
        '<div class="pdf-icon"><svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:#3a9960;stroke-width:2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>' +
        '<span class="sr-ttl">' + item.title + '</span>' +
        '<span class="sr-cat">' + item.category + '</span>';
      srList.appendChild(a);
    });
  }
}

  var btn=document.getElementById('uBtn'),nxt=document.getElementById('uNext');

  try{localStorage.setItem(TOK_KEY,'1');saveToSheet(getUID());}catch(e){}
}
