<style>

}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#fff3e8;color:var(--txt)}
.page{max-width:480px;margin:0 auto;background:var(--surface2);padding-bottom:130px}

/* ヘッダー */
.hd{background:linear-gradient(155deg,#bf3d00 0%,#e65100 60%,#ff7043 100%);padding:16px 16px 20px;position:relative;overflow:hidden}
.hd:after{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}
.hd-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 11px;text-decoration:none;flex-shrink:0;transition:background .15s}
.back-btn:hover{background:rgba(255,255,255,.25)}
.back-btn svg{width:11px;height:11px;fill:none;stroke:rgba(255,255,255,.85);stroke-width:2.5}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.22);color:#fff;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.05em;border:1px solid rgba(255,255,255,.3)}
.hd-num{font-size:11px;color:rgba(255,255,255,.75);letter-spacing:.1em;font-weight:500;margin-bottom:5px}
.hd-title{font-size:20px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px}
.hd-sub{font-size:13px;font-weight:500;color:rgba(255,255,255,.8);line-height:1.3}
.hd-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.nav-dots{display:flex;gap:4px;align-items:center;flex-wrap:wrap;max-width:160px;justify-content:center}
.nd{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3)}
.nd.on{background:#fff;width:16px;border-radius:3px}
.nav-prev,.nav-next{font-size:11px;color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 12px;text-decoration:none;display:flex;align-items:center;gap:3px;transition:background .15s;flex-shrink:0}
.nav-prev:hover,.nav-next:hover{background:rgba(255,255,255,.25)}
.nav-prev svg,.nav-next svg{width:10px;height:10px;fill:none;stroke:#fff;stroke-width:2.5}

.content{padding:18px 16px}

/* 学べることカード */
.learn-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.learn-head{display:flex;align-items:center;gap:7px;padding:11px 14px;border-bottom:1px solid var(--bdr);background:#fff3e0}
.learn-head svg{width:13px;height:13px;fill:none;stroke:var(--g2);stroke-width:2}
.learn-head span{font-size:12px;font-weight:700;color:var(--g2);letter-spacing:.04em}
.learn-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid #fff3e0;align-items:flex-start}
.learn-row:last-child{border-bottom:none}
.ln{width:20px;height:20px;border-radius:6px;background:var(--g2);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.lt{font-size:13px;color:var(--txt);line-height:1.65}
.lt b{color:var(--g2)}

/* メインアコーディオン */
.sec-block{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sec-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;background:#f5faf7;transition:background .12s}
.sec-head:hover{background:#fff3e0}
.sec-block.open .sec-head{background:#fff3e0;border-bottom:1px solid var(--bdr)}
.sec-label{font-size:13px;font-weight:700;color:var(--txt);flex:1}
.sec-sub{font-size:11px;color:var(--txt3)}
.sec-arr{width:16px;height:16px;flex-shrink:0;transition:transform .25s}
.sec-arr svg{width:16px;height:16px;fill:none;stroke:#aaa;stroke-width:2}
.sec-block.open .sec-arr{transform:rotate(180deg)}
.sec-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.sec-block.open .sec-body{max-height:10000px}
.sec-content{padding:14px}

/* 食品表 */
.food-table{width:100%;border-collapse:collapse;font-size:12px}
.food-table th{background:#fff3e0;color:var(--g2);font-weight:700;padding:7px 6px;text-align:center;border-bottom:2px solid var(--bdr);font-size:11px}
.food-table th:first-child{text-align:left}
.food-table td{padding:7px 6px;border-bottom:1px solid #fff8f5;color:var(--txt2);text-align:center;vertical-align:middle}
.food-table td:first-child{text-align:left;color:var(--txt);font-weight:500;font-size:12px}
.food-table tr:last-child td{border-bottom:none}
.food-table tr:hover td{background:#fff8f5}
.unit{font-size:10px;color:var(--txt3);display:block}

/* コンビニ サブアコーディオン */
.sub-block{border-top:1px solid #fff3e0}
.sub-block:first-child{border-top:none}
.sub-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;background:var(--surface2);transition:background .12s}
.sub-head:hover{background:#fff3e0}
.sub-name{font-size:13px;font-weight:700;color:var(--txt2)}
.sub-arr{width:14px;height:14px;transition:transform .2s}
.sub-arr svg{width:14px;height:14px;fill:none;stroke:#bbb;stroke-width:2}
.sub-block.open .sub-arr{transform:rotate(180deg)}
.sub-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.sub-block.open .sub-body{max-height:2000px}
.sub-content{padding:10px 14px}
.item-list{list-style:none;padding:0}
.item-list li{display:flex;gap:6px;font-size:12px;color:var(--txt2);line-height:1.8;padding:2px 0}
.item-list li:before{content:'・';color:var(--g3);flex-shrink:0}

/* レシピサブアコーディオン */
.recipe-block{border-top:1px solid #fff3e0}
.recipe-block:first-child{border-top:none}
.recipe-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;background:var(--surface2);transition:background .12s}
.recipe-head:hover{background:#fff3e0}
.recipe-name{font-size:13px;font-weight:500;color:var(--txt2)}
.recipe-arr{width:14px;height:14px;transition:transform .2s}
.recipe-arr svg{width:14px;height:14px;fill:none;stroke:#bbb;stroke-width:2}
.recipe-block.open .recipe-arr{transform:rotate(180deg)}
.recipe-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.recipe-block.open .recipe-body{max-height:1000px}
.recipe-content{padding:10px 14px}
.recipe-ingredients{background:#fff8f5;border-radius:var(--rs);padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--txt2);line-height:1.8}
.pfc-badge{display:inline-flex;align-items:center;gap:6px;background:#fff3e0;border-radius:6px;padding:5px 10px;font-size:12px;color:var(--g2);font-weight:700}

/* 1日メニューカード */
.meal-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;margin-bottom:10px}
.meal-card:last-child{margin-bottom:0}
.meal-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.meal-label{font-size:13px;font-weight:700;color:var(--txt)}
.meal-pfc{font-size:11px;color:var(--txt3)}
.meal-items{list-style:none;padding:0}
.meal-items li{font-size:12px;color:var(--txt2);line-height:1.8;display:flex;gap:6px}
.meal-items li:before{content:'・';color:var(--g3);flex-shrink:0}
.total-card{background:#fff3e0;border:1px solid #ffb088;border-radius:var(--rs);padding:10px 12px;text-align:center;font-size:12px;color:var(--txt2);line-height:1.8}
.total-card b{color:var(--g1)}

.u-wrap{margin-bottom:20px}
.u-btn{width:100%;padding:15px 20px;background:var(--g2);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.03em;transition:background .2s,transform .15s;-webkit-appearance:none}
.u-btn:hover{background:var(--g3);transform:translateY(-1px)}
.u-btn:active{transform:none}
.u-btn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5}
.u-btn.done{background:#c8956a;cursor:default}
.u-btn.done:hover{transform:none;background:#c8956a}
.u-next{text-align:center;font-size:12px;color:var(--txt3);margin-top:8px;display:none}
.u-next a{color:var(--g2);font-weight:700;text-decoration:none}

.others-lbl{font-size:11px;font-weight:700;color:var(--txt3);margin-bottom:8px;letter-spacing:.06em}
.others-grid{display:grid;grid-template-columns:minmax(0,1fr);gap:7px}
.oc{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--rs);padding:11px 12px;text-decoration:none;display:block;transition:border-color .15s,transform .15s,box-shadow .15s}
.oc:hover{border-color:var(--g3);transform:translateY(-2px);box-shadow:0 4px 12px rgba(230,81,0,.12)}
.oc-num{font-size:10px;color:var(--g3);font-weight:700;letter-spacing:.06em;margin-bottom:3px}
.oc-title{font-size:12px;color:var(--txt);line-height:1.45;font-weight:500}
.oc-tag{display:inline-block;font-size:10px;background:#fff0e6;color:var(--g2);padding:2px 7px;border-radius:4px;margin-top:5px;font-weight:500}

.fixed-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#3d3e4d;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 -2px 16px rgba(0,0,0,.18)}
.fb-text{flex:1;min-width:0}
.fb-catch{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.05em;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.fb-title{font-size:13px;font-weight:700;color:#fff;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-btn{flex-shrink:0;background:#fff;color:#2d2e3d;font-size:11px;font-weight:700;padding:8px 14px;border-radius:999px;text-decoration:none;white-space:nowrap;letter-spacing:.02em;transition:background .15s,transform .15s;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.fb-btn:hover{background:#eef0f5;transform:scale(1.04)}

.kinniku-acc-cta:hover{background:#00695c}

.lib-back-foot{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;box-sizing:border-box;background:#fff;border:1px solid #e5ddd0;border-radius:12px;padding:14px;margin-top:4px;font-size:13px;font-weight:700;color:#4a875b;text-decoration:none}</style>

/* =============================================
   UI生成
   ============================================= */
function buildTable(data){
  var html = '<table class="food-table"><thead><tr><th>食品名</th><th>kcal<span class="unit">100gあたり</span></th><th>P<span class="unit">g</span></th><th>F<span class="unit">g</span></th></tr></thead><tbody>';
  data.forEach(function(d){
    html += '<tr><td>' + d.name + '</td><td>' + d.kcal + '</td><td>' + d.p.toFixed(1) + '</td><td>' + d.f.toFixed(1) + '</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

function buildConvenienceSection(){
  var html = '';
  convenienceData.forEach(function(c, i){
    var id = 'conv_' + i;
    var itemsHTML = c.items.map(function(item){ return '<li>' + item + '</li>'; }).join('');
    html +=
      '<div class="sub-block" id="' + id + '">' +
        '<div class="sub-head" onclick="toggleSub(\'' + id + '\')">' +
          '<div class="sub-name">' + c.store + '</div>' +
          '<div class="sub-arr"><svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg></div>' +
        '</div>' +
        '<div class="sub-body"><div class="sub-content"><ul class="item-list">' + itemsHTML + '</ul></div></div>' +
      '</div>';
  });
  return html;
}

function buildRecipesSection(){
  var html = '';
  recipesData.forEach(function(r, i){
    var id = 'rec_' + i;
    html +=
      '<div class="recipe-block" id="' + id + '">' +
        '<div class="recipe-head" onclick="toggleSub(\'' + id + '\')">' +
          '<div class="recipe-name">' + r.name + '</div>' +
          '<div class="recipe-arr"><svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg></div>' +
        '</div>' +
        '<div class="recipe-body"><div class="recipe-content">' +
          '<div class="recipe-ingredients">' + r.ingredients + '</div>' +
          '<div class="pfc-badge">' + r.pfc + '</div>' +
        '</div></div>' +
      '</div>';
  });
  return html;
}

function buildDailyMenuSection(){
  var html = '';
  dailyMenu.forEach(function(m){
    var itemsHTML = m.items.map(function(item){ return '<li>' + item + '</li>'; }).join('');
    html +=
      '<div class="meal-card">' +
        '<div class="meal-title">' +
          '<div class="meal-label">' + m.label + '</div>' +
          '<div class="meal-pfc">' + m.pfc + '</div>' +
        '</div>' +
        '<ul class="meal-items">' + itemsHTML + '</ul>' +
      '</div>';
  });
  html +=
    '<div class="total-card">' +
      '<b>1日合計：約1500〜1700kcal</b><br>' +
      'たんぱく質 約105g ／ 脂質 約18g' +
    '</div>';
  return html;
}

function buildSections(){
  var container = document.getElementById('sectionList');
  var sections = [
    {
      label: '① 動物性たんぱく質一覧',
      sub: '16品目',
      content: buildTable(animalProteins)
    },
    {
      label: '② 植物性たんぱく質一覧',
      sub: '12品目',
      content: buildTable(plantProteins)
    },
    {
      label: '③ コンビニで買えるたんぱく質源',
      sub: '3店舗',
      content: buildConvenienceSection()
    },
    {
      label: '④ おすすめレシピ7選',
      sub: '材料・PFC付き',
      content: buildRecipesSection()
    },
    {
      label: '⑤ 1日メニュー例',
      sub: '朝・昼・夜',
      content: buildDailyMenuSection()
    }
  ];

  sections.forEach(function(s, i){
    var id = 'sec_' + i;
    var block = document.createElement('div');
    block.className = 'sec-block';
    block.id = id;
    block.innerHTML =
      '<div class="sec-head" onclick="toggleSec(\'' + id + '\')">' +
        '<div>' +
          '<div class="sec-label">' + s.label + '</div>' +
          '<div class="sec-sub">' + s.sub + '</div>' +
        '</div>' +
        '<div class="sec-arr"><svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg></div>' +
      '</div>' +
      '<div class="sec-body"><div class="sec-content">' + s.content + '</div></div>';
    container.appendChild(block);
  });
}

function toggleSec(id){ document.getElementById(id).classList.toggle('open'); }
function toggleSub(id){ document.getElementById(id).classList.toggle('open'); }

function markDone(){
  var btn=document.getElementById('uBtn'),nxt=document.getElementById('uNext');
  if(btn.classList.contains('done'))return;
  btn.classList.add('done');
  btn.innerHTML='<svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5"><polyline points="20,6 9,17 4,12"/></svg> 確認完了！';
  nxt.style.display='block';
  try{localStorage.setItem(TOK_KEY,'1');saveToSheet(getUID());}catch(e){}
}
