<style>
:root{
  --g1:#2a7a4a;--g2:#3a9960;--g3:#5cbd82;--g4:#a8dbbe;--g5:#f0faf4;
  --surface:#fff;--surface2:#f7fcf9;
  --acc:#f5c842;--acc2:#7a5c00;
  --txt:#1a3326;--txt2:#3a6050;--txt3:#7aaa8e;
  --bdr:#d0ead8;
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#e4f4ea;color:var(--txt)}
.page{max-width:480px;margin:0 auto;background:var(--surface2);padding-bottom:130px}

.hd{background:linear-gradient(155deg,#2a7a4a 0%,#3a9960 60%,#4ab870 100%);padding:16px 16px 20px;position:relative;overflow:hidden}
.hd:after{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}
.hd-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 11px;text-decoration:none;flex-shrink:0;transition:background .15s}
.back-btn:hover{background:rgba(255,255,255,.25)}
.back-btn svg{width:11px;height:11px;fill:none;stroke:rgba(255,255,255,.85);stroke-width:2.5}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.22);color:#fff;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;letter-spacing:.05em;border:1px solid rgba(255,255,255,.3)}
.hd-num{font-size:11px;color:rgba(255,255,255,.75);letter-spacing:.1em;font-weight:500;margin-bottom:5px}
.hd-title{font-size:22px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px}
.hd-sub{font-size:13px;font-weight:500;color:rgba(255,255,255,.8);line-height:1.3}
.hd-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.nav-dots{display:flex;gap:4px;align-items:center}
.nd{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3)}
.nd.on{background:#fff;width:16px;border-radius:3px}
.nav-prev,.nav-next{font-size:11px;color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 12px;text-decoration:none;display:flex;align-items:center;gap:3px;transition:background .15s}
.nav-prev:hover,.nav-next:hover{background:rgba(255,255,255,.25)}
.nav-prev svg,.nav-next svg{width:10px;height:10px;fill:none;stroke:#fff;stroke-width:2.5}

.content{padding:18px 16px}

.speed-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--bdr);border-radius:24px;padding:7px 14px;margin-bottom:18px;font-size:12px;color:var(--txt2)}
.speed-pill svg{width:13px;height:13px;fill:none;stroke:var(--g3);stroke-width:2}
.speed-pill b{color:var(--g1)}

.learn-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.learn-head{display:flex;align-items:center;gap:7px;padding:11px 14px;border-bottom:1px solid var(--bdr);background:#eef8f2}
.learn-head svg{width:13px;height:13px;fill:none;stroke:var(--g2);stroke-width:2}
.learn-head span{font-size:12px;font-weight:700;color:var(--g2);letter-spacing:.04em}
.learn-row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid #eef8f2;align-items:flex-start}
.learn-row:last-child{border-bottom:none}
.ln{width:20px;height:20px;border-radius:6px;background:var(--g2);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.lt{font-size:13px;color:var(--txt);line-height:1.65}
.lt b{color:var(--g2)}

.alert{display:flex;gap:9px;background:#eef8f2;border:1px solid #b8dfc5;border-radius:var(--rs);padding:11px 13px;margin-bottom:18px;align-items:flex-start}
.alert svg{width:15px;height:15px;fill:none;stroke:var(--g2);stroke-width:2;flex-shrink:0;margin-top:2px}
.alert p{font-size:12px;color:var(--txt2);line-height:1.65}

.u-wrap{margin-bottom:20px}
.u-btn{width:100%;padding:15px 20px;background:var(--g2);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.03em;transition:background .2s,transform .15s;-webkit-appearance:none}
.u-btn:hover{background:var(--g3);transform:translateY(-1px)}
.u-btn:active{transform:none}
.u-btn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5}
.u-btn.done{background:#9abfaa;cursor:default}
.u-btn.done:hover{transform:none;background:#9abfaa}
.u-next{text-align:center;font-size:12px;color:var(--txt3);margin-top:8px;display:none}
.u-next a{color:var(--g2);font-weight:700;text-decoration:none}

.others-lbl{font-size:11px;font-weight:700;color:var(--txt3);margin-bottom:8px;letter-spacing:.06em}
.others-grid{display:grid;grid-template-columns:minmax(0,1fr);gap:7px}
.oc{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--rs);padding:11px 12px;text-decoration:none;display:block;transition:border-color .15s,transform .15s,box-shadow .15s}
.oc:hover{border-color:var(--g3);transform:translateY(-2px);box-shadow:0 4px 12px rgba(58,153,96,.12)}
.oc-num{font-size:10px;color:var(--g3);font-weight:700;letter-spacing:.06em;margin-bottom:3px}
.oc-title{font-size:12px;color:var(--txt);line-height:1.45;font-weight:500}
.oc-tag{display:inline-block;font-size:10px;background:#e8f5ee;color:var(--g2);padding:2px 7px;border-radius:4px;margin-top:5px;font-weight:500}

.fixed-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#3d3e4d;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 -2px 16px rgba(0,0,0,.18)}
.fb-text{flex:1;min-width:0}
.fb-catch{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.05em;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.fb-title{font-size:13px;font-weight:700;color:#fff;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-btn{flex-shrink:0;background:#fff;color:#2d2e3d;font-size:11px;font-weight:700;padding:8px 14px;border-radius:999px;text-decoration:none;white-space:nowrap;letter-spacing:.02em;transition:background .15s,transform .15s;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.fb-btn:hover{background:#eef0f5;transform:scale(1.04)}
.fb-btn:active{transform:scale(.97)}

/* 筋肉塾誘導アコーディオン（全特典共通） */
.kinniku-acc{margin-bottom:18px;border:2px solid #00695c;border-radius:0;background:#00897b;box-shadow:0 0 0 4px rgba(0,137,123,.15);overflow:hidden}
.kinniku-acc-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;user-select:none;-webkit-user-select:none;color:#fff;font-weight:700;background:#00897b;transition:background .2s}
.kinniku-acc-head:hover{background:#00796b}
.kinniku-acc-label{display:flex;align-items:center;gap:10px;font-size:14px;flex:1;min-width:0}
.kinniku-acc-icon{width:30px;height:30px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kinniku-acc-icon svg{width:16px;height:16px;fill:#fff}
.kinniku-acc-arr{font-size:11px;color:#fff;transition:transform .25s;flex-shrink:0;margin-left:8px}
.kinniku-acc.open .kinniku-acc-arr{transform:rotate(180deg)}
.kinniku-acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease;background:#fff}
.kinniku-acc.open .kinniku-acc-body{max-height:3000px}
.kinniku-acc-inner{padding:18px 20px;font-size:13px;line-height:1.8;color:#1a1a1a}
.kinniku-acc-inner p{margin:0 0 10px}
.kinniku-acc-inner p:last-of-type{margin-bottom:0}
.kinniku-acc-inner .kn-list{margin:10px 0;padding:0;list-style:none}
.kinniku-acc-inner .kn-list li{color:#00695c;font-weight:600;padding:5px 0;font-size:12.5px;line-height:1.6}
.kinniku-acc-inner .kn-emph{color:#00897b;font-weight:700}
.kinniku-acc-inner .kn-sign{text-align:right;font-size:12px;color:#00695c;margin-top:14px;font-style:italic}
.kinniku-acc-cta{display:block;width:100%;background:#00897b;color:#fff;text-align:center;padding:14px 20px;font-size:14px;font-weight:700;text-decoration:none;margin-top:16px;letter-spacing:.04em;transition:background .2s;box-sizing:border-box;border:none;cursor:pointer}
.kinniku-acc-cta:hover{background:#00695c}

.lib-back-foot{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;box-sizing:border-box;background:#fff;border:1px solid #e5ddd0;border-radius:12px;padding:14px;margin-top:4px;font-size:13px;font-weight:700;color:#4a875b;text-decoration:none}</style>

<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbykX2iRwcitZF8oQempb0SO-TUwXkNmnCrzwEJfKmLDsd3999zcsgbyWlYMmjnoiigg/exec';
var TOK_KEY='tok_03_done';
var TOK_NUM='03';
var TOK_TITLE='筋トレ基礎知識完全攻略';

function getUID(){
  var p=new URLSearchParams(window.location.search);
  return p.get('uid')||localStorage.getItem('nori_uid')||'guest';
}
function saveToSheet(uid){
  try{fetch(GAS_URL,{method:'POST',body:JSON.stringify({uid:uid,tokuten:TOK_NUM,title:TOK_TITLE}),headers:{'Content-Type':'application/json'}});}catch(e){}
}
function markDone(){
  var btn=document.getElementById('uBtn'),nxt=document.getElementById('uNext');
  if(btn.classList.contains('done'))return;
  btn.classList.add('done');
  btn.innerHTML='<svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5"><polyline points="20,6 9,17 4,12"/></svg> 視聴完了！';
  nxt.style.display='block';
  try{localStorage.setItem(TOK_KEY,'1');saveToSheet(getUID());}catch(e){}
}
window.addEventListener('DOMContentLoaded',function(){
  try{
    var p=new URLSearchParams(window.location.search);
    var uid=p.get('uid');
    if(uid) localStorage.setItem('nori_uid',uid);
  }catch(e){}
  try{
    if(localStorage.getItem(TOK_KEY)==='1'){
      var btn=document.getElementById('uBtn'),nxt=document.getElementById('uNext');
      btn.classList.add('done');
      btn.innerHTML='<svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5"><polyline points="20,6 9,17 4,12"/></svg> 視聴完了！';
      nxt.style.display='block';
    }
  }catch(e){}
});
</script>
