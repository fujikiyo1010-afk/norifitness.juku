.content{padding:18px 16px}

.pdf-btn{width:100%;padding:15px 20px;background:var(--g2);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.03em;transition:background .2s,transform .15s;text-decoration:none;margin-bottom:18px}

.rcp-acc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff3e0;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .15s}

.rcp-acc-meta{display:flex;align-items:center;gap:6px}

.rcp-acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease;background:#fff}

.rcp-acc-list{padding:12px;display:grid;grid-template-columns:1fr;gap:10px}
.rcp-acc-list img{width:100%;border-radius:8px;border:1px solid var(--bdr);display:block}

.rcp-single-body{padding:12px}
.rcp-single-body img{width:100%;border-radius:8px;border:1px solid var(--bdr);display:block}
/* 案B: 画像→直下テキストペア */
.rcp-pair{margin-top:14px;padding-top:14px;border-top:1px dashed var(--bdr)}
.rcp-pair:first-child{margin-top:0;padding-top:0;border-top:none}
.rcp-pair img{width:100%;border-radius:8px;border:1px solid var(--bdr);display:block;margin-bottom:10px}
.rcp-catch{display:inline-block;background:#fff3e0;color:var(--g1);font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;margin-bottom:10px;border:1px solid var(--bdr)}
.rcp-section{margin-top:12px}
.rcp-section-title{font-size:13px;font-weight:700;color:var(--g1);display:flex;align-items:center;gap:6px;margin-bottom:7px;padding-bottom:5px;border-bottom:2px solid var(--g2)}

.rcp-nut-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;line-height:1.4;padding:2px 0;border-bottom:1px dotted #ffd6b5}
.rcp-nut-row:nth-last-child(-n+2){border-bottom:none}
.rcp-nut-row .k{color:var(--txt2);font-weight:500}
.rcp-nut-row .v{color:var(--g1);font-weight:700;font-family:'SF Mono',Menlo,Consolas,monospace}
.rcp-nut-portion{grid-column:1/-1;font-size:11px;color:var(--g2);font-weight:700;margin-bottom:3px}
/* 材料リスト */
.rcp-ing{list-style:none;padding:0;margin:0}
.rcp-ing-li{font-size:13px;line-height:1.7;padding:4px 0 4px 18px;position:relative;color:var(--txt);border-bottom:1px dotted #f0e0d0}
.rcp-ing-li:before{content:'•';position:absolute;left:5px;color:var(--g2);font-weight:700}
.rcp-ing-li:last-child{border-bottom:none}
.rcp-copy-btn{margin-top:8px;background:var(--g2);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:11.5px;font-weight:700;cursor:pointer;letter-spacing:.04em;display:inline-flex;align-items:center;gap:5px;transition:background .2s,transform .15s;-webkit-appearance:none;font-family:inherit}
.rcp-copy-btn:hover{background:var(--g3);transform:translateY(-1px)}
.rcp-copy-btn:active{transform:none}
.rcp-copy-btn.is-copied{background:#4caf50}
.rcp-copy-btn svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2.2}

.rcp-steps{list-style:none;padding:0;margin:0;counter-reset:step}
.rcp-step{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.65;padding:8px 0;border-bottom:1px dotted #f0e0d0;color:var(--txt)}
.rcp-step:last-child{border-bottom:none}
.rcp-step-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--g2);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;font-family:'SF Mono',Menlo,Consolas,monospace}

.rcp-note{margin-top:8px;background:#fff3e0;border-left:3px solid var(--g2);border-radius:6px;padding:8px 11px;font-size:12px;line-height:1.6;color:var(--txt2)}
.rcp-note:before{content:'💡 ';font-weight:700}

.rcp-textonly{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px}

.rcp-textonly-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--g1)}
.rcp-textonly-arr{font-size:11px;color:var(--g2);transition:transform .25s}

.rcp-textonly.open .rcp-textonly-body{max-height:99999px}
.rcp-textonly-list{padding:10px 12px}
.rcp-textonly-item{background:#fff;border:1px solid var(--bdr);border-radius:10px;margin-bottom:8px;overflow:hidden}
.rcp-textonly-item-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;user-select:none;-webkit-user-select:none;background:#fff3e0;transition:background .15s}
.rcp-textonly-item-head:hover{background:#ffe5cc}
.rcp-textonly-item-label{font-size:13px;font-weight:700;color:var(--g1)}
.rcp-textonly-item-arr{font-size:10px;color:var(--g2);transition:transform .25s}
.rcp-textonly-item.open .rcp-textonly-item-arr{transform:rotate(180deg)}
.rcp-textonly-item-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.rcp-textonly-item.open .rcp-textonly-item-body{max-height:9999px}
.rcp-textonly-item-inner{padding:12px}
.pdf-btn:hover{background:var(--g3);transform:translateY(-1px)}
.pdf-btn:active{transform:none}
.pdf-btn svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5}

.learn-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:14px}

<script>
var PDF_URL = 'https://drive.google.com/file/d/1WHOfuHA3WBLcC5UoWEjErY8pPX7nZsJH/preview';
document.getElementById('pdfBtn').href = PDF_URL;

/* レシピ構造化データ (4テーマ × 各画像にテキスト) */

/* ===== 共通レンダリング関数 ===== */
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

function renderNutrition(p){
  if(!p.nutrition) return '';
  var rows='';
  for(var k in p.nutrition){ rows += '<div class="rcp-nut-row"><span class="k">'+escapeHtml(k)+'</span><span class="v">'+escapeHtml(p.nutrition[k])+'</span></div>'; }
  var portion = p.portion ? '<div class="rcp-nut-portion">📊 '+escapeHtml(p.portion)+'</div>' : '<div class="rcp-nut-portion">📊 栄養成分</div>';
  return '<div class="rcp-section"><div class="rcp-section-title">📊 栄養成分</div><div class="rcp-nut">'+portion+rows+'</div>'+(p.note?'<div class="rcp-note">'+escapeHtml(p.note)+'</div>':'')+'</div>';
}
function renderIngredients(p, opts){
  if(!p.ingredients||!p.ingredients.length) return '';
  var noBtn = opts && opts.noCopyBtn;
  var lis = p.ingredients.map(function(it){return '<li class="rcp-ing-li">'+escapeHtml(it)+'</li>';}).join('');
  var copyText = p.ingredients.map(function(it){return '・'+it;}).join('\n');
  var btnHtml = noBtn ? '' :
    '<button type="button" class="rcp-copy-btn" data-copy-text="'+escapeHtml(copyText)+'">'+
    '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'+
    '<span>🛒 買い物リストをコピー</span></button>';
  return '<div class="rcp-section"><div class="rcp-section-title">🛒 材料</div><ul class="rcp-ing">'+lis+'</ul>'+
    btnHtml +
    (p.note?'<div class="rcp-note">'+escapeHtml(p.note)+'</div>':'')+'</div>';
}

/* レシピ全体をコピペ向けプレーンテキストに整形（特典13: theme + catch + nutrition + ingredients + steps + notes） */
function buildRecipeCopyText(group){
  var nutP = group.pairs.find(function(p){return p.kind==='nutrition';});
  var ingP = group.pairs.find(function(p){return p.kind==='ingredients';});
  var stepPs = group.pairs.filter(function(p){return p.kind==='steps' || p.kind==='steps-partial';});
  var allSteps = stepPs.reduce(function(a,p){return a.concat(p.steps);},[]);
  var lines = [];
  lines.push('【'+group.theme+'】');
  if(group.catch) lines.push('✨ '+group.catch);
  lines.push('');
  if(nutP && nutP.nutrition){
    lines.push('📊 栄養成分'+(nutP.portion?'（'+nutP.portion+'）':''));
    for(var k in nutP.nutrition){ lines.push('・'+k+': '+nutP.nutrition[k]); }
    if(nutP.note) lines.push('💡 '+nutP.note);
    lines.push('');
  }
  if(ingP && ingP.ingredients && ingP.ingredients.length){
    lines.push('🛒 材料');
    ingP.ingredients.forEach(function(it){ lines.push('・'+it); });
    if(ingP.note) lines.push('💡 '+ingP.note);
    lines.push('');
  }
  if(allSteps.length){
    lines.push('👨‍🍳 作り方');
    allSteps.forEach(function(s,i){ lines.push((i+1)+'. '+s); });
    lines.push('');
  }
  return lines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}
function renderSteps(p){
  if(!p.steps||!p.steps.length) return '';
  var start = p.stepStart || 1;
  var lis = p.steps.map(function(s,i){return '<li class="rcp-step"><span class="rcp-step-num">'+(start+i)+'</span><span>'+escapeHtml(s)+'</span></li>';}).join('');
  var title = p.kind==='steps-partial' ? '👨‍🍳 作り方（続き）' : '👨‍🍳 作り方';
  return '<div class="rcp-section"><div class="rcp-section-title">'+title+'</div><ol class="rcp-steps">'+lis+'</ol></div>';
}
function renderCover(p){
  return p.text ? '<div class="rcp-catch">'+p.text+'</div>' : '';
}
function renderPair(p){
  var html = '<div class="rcp-pair">';
  html += '<img src="'+p.img+'" alt="" loading="lazy">';
  // cover画像はキャッチコピー枠を出さない（画像のみ・空白で次へ）
  if(p.kind==='nutrition') html += renderNutrition(p);
  else if(p.kind==='ingredients') html += renderIngredients(p);
  else if(p.kind==='steps' || p.kind==='steps-partial') html += renderSteps(p);
  html += '</div>';
  return html;
}

/* メイン領域: 4テーマアコーディオン（中身は画像→直下テキスト） */
(function buildRecipeAccordions(){
  var section = document.getElementById('recipeSection');
  if (!section) return;
  recipeData.forEach(function(group){
    var acc = document.createElement('div');
    acc.className = 'rcp-acc';
    var pairs = group.pairs.map(renderPair).join('');
    acc.innerHTML =
      '<div class="rcp-acc-head">' +
        '<div class="rcp-acc-label">' +
          '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>' +
          escapeHtml(group.theme) +
        '</div>' +
        '<div class="rcp-acc-meta">' +
          '<span class="rcp-acc-count">' + group.pairs.length + '枚</span>' +
          '<span class="rcp-acc-arr">▼</span>' +
        '</div>' +
      '</div>' +
      '<div class="rcp-acc-body"><div style="padding:14px">' + pairs + '</div></div>';
    var head = acc.querySelector('.rcp-acc-head');
    head.addEventListener('click', function(){ acc.classList.toggle('open'); });
    section.appendChild(acc);
  });
})();

/* レシピのみ一覧（テキストのみ・二段アコーディオン・末尾に丸ごとコピー） */
(function buildRecipeTextOnly(){
  var section = document.getElementById('recipeTextOnlySection');
  if (!section) return;
  var items = recipeData.map(function(group){
    var nutP = group.pairs.find(function(p){return p.kind==='nutrition';});
    var ingP = group.pairs.find(function(p){return p.kind==='ingredients';});
    var stepPs = group.pairs.filter(function(p){return p.kind==='steps' || p.kind==='steps-partial';});
    var allSteps = stepPs.reduce(function(acc,p){return acc.concat(p.steps);},[]);
    var inner = '';
    if(group.catch) inner += '<div class="rcp-catch">✨ '+escapeHtml(group.catch)+'</div>';
    if(nutP) inner += renderNutrition(nutP);
    if(ingP) inner += renderIngredients(ingP, {noCopyBtn: true});
    if(allSteps.length){
      inner += renderSteps({steps:allSteps, kind:'steps'});
    }
    var fullText = buildRecipeCopyText(group);
    inner += '<div class="rcp-section" style="margin-top:14px;text-align:center">' +
      '<button type="button" class="rcp-copy-btn rcp-copy-full" data-copy-text="'+escapeHtml(fullText)+'" style="background:#b8860b;padding:10px 18px;font-size:12.5px">' +
      '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
      '<span>📋 このレシピをまるごとコピー</span></button></div>';
    return '<div class="rcp-textonly-item">' +
      '<div class="rcp-textonly-item-head"><span class="rcp-textonly-item-label">'+escapeHtml(group.theme)+'</span><span class="rcp-textonly-item-arr">▼</span></div>' +
      '<div class="rcp-textonly-item-body"><div class="rcp-textonly-item-inner">'+inner+'</div></div>' +
      '</div>';
  }).join('');
  section.innerHTML =
    '<div class="rcp-textonly">' +
      '<div class="rcp-textonly-head">' +
        '<div class="rcp-textonly-label">📋 レシピのみ一覧を見る（テキスト）</div>' +
        '<span class="rcp-textonly-arr">▼</span>' +
      '</div>' +
      '<div class="rcp-textonly-body"><div class="rcp-textonly-list">'+items+'</div></div>' +
    '</div>';
  var top = section.querySelector('.rcp-textonly-head');
  top.addEventListener('click', function(){ section.querySelector('.rcp-textonly').classList.toggle('open'); });
  section.querySelectorAll('.rcp-textonly-item-head').forEach(function(h){
    h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); });
  });
})();

/* コピーボタンの挙動（イベント委譲） */
document.addEventListener('click', function(e){
  var btn = e.target.closest('.rcp-copy-btn');
  if(!btn) return;
  var text = btn.getAttribute('data-copy-text');
  if(!text) return;
  var span = btn.querySelector('span');
  var origLbl = span ? span.textContent : '';
  var done = function(){
    btn.classList.add('is-copied');
    if(span) span.textContent = '✓ コピーしました';
    setTimeout(function(){ btn.classList.remove('is-copied'); if(span) span.textContent = origLbl; }, 1800);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){fbCopy(text,done);});
  } else { fbCopy(text, done); }
});
function fbCopy(text, cb){
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy'); cb&&cb();}catch(e){}
  document.body.removeChild(ta);
}
