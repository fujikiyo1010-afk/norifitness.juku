<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>体組成 詳細 ・ 確定版（style2）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f9f5ed;--card:#fffdf8;--line:#e7dcc9;--ink:#2b2620;--ink2:#6a6256;--ink3:#a59b8c;--grn:#4a875b;--grnd:#004d40;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:#ece0cf;color:var(--ink);padding:20px 12px 60px;}
  .head{max-width:1100px;margin:0 auto 16px;text-align:center;}
  .head h1{font-size:20px;font-weight:800;margin-bottom:4px;}
  .head p{font-size:12px;color:#7a6f5c;line-height:1.6;}
  .cols{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;max-width:1200px;margin:0 auto;}
  .col{display:flex;flex-direction:column;align-items:center;}
  .cap{font-size:13px;font-weight:800;color:#5b5344;margin-bottom:8px;background:#fff;border-radius:20px;padding:5px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .capsub{font-size:11px;color:#7a6f5c;margin-bottom:10px;text-align:center;max-width:330px;line-height:1.5;}
  .phone{width:340px;background:var(--bg);border:8px solid #1c1c1c;border-radius:34px;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.2);position:relative;}
  .sbar{background:#1c1c1c;color:#fff;text-align:center;font-size:10px;padding:4px;font-family:'Inter';}
  .scr{padding:14px 14px 22px;}
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 12px;}
  .hdr .back{font-size:13px;color:var(--ink2);font-weight:700;} .hdr .t{font-size:13px;font-weight:800;color:var(--grnd);}
  .pill{display:flex;gap:6px;background:#f0ece2;padding:5px;border-radius:14px;margin-bottom:14px;}
  .pill span{flex:1;text-align:center;font-size:12px;font-weight:800;padding:9px;border-radius:10px;color:var(--ink2);}
  .pill span.on{background:var(--grn);color:#fff;box-shadow:0 2px 6px rgba(74,135,91,.35);}
  /* リング */
  .ringwrap{text-align:center;padding:4px 0 14px;}
  .ringbox{position:relative;width:124px;height:124px;margin:0 auto;}
  .ringbox .n{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ringbox .n b{font-size:31px;font-weight:800;font-family:'Inter';line-height:1;}
  .ringbox .n s{font-size:11px;color:var(--ink2);text-decoration:none;margin-top:3px;}
  /* 3カラム */
  .cols3{display:flex;justify-content:space-around;padding:13px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-size:11px;}
  .cols3 span{color:#6a6256;font-weight:700;text-align:center;}
  .cols3 b{display:block;font-size:17px;font-family:'Inter';margin-top:3px;color:#2b2620;}
  .cols3 b.g{color:#004d40;}
  /* ピル2つ */
  .pills2{display:flex;justify-content:center;gap:10px;margin:14px 0 4px;}
  .pills2 .p{background:#eef5f0;border:1px solid #dce9e0;border-radius:16px;padding:9px 22px;text-align:center;line-height:1.2;}
  .pills2 .p .l{display:block;font-size:11px;font-weight:700;color:#6a6256;}
  .pills2 .p .v{display:block;font-size:17px;font-weight:800;color:#004d40;font-family:'Inter';margin-top:3px;}
  .sec{font-size:12px;font-weight:800;color:#5b5344;margin:16px 2px 8px;}
  .graph{padding:6px 0;} svg.line{width:100%;display:block;}
  /* 予測カード */
  .pred{border:1px solid #d7e6db;border-radius:14px;padding:14px;background:linear-gradient(135deg,#eef5f0,#fffbe6);margin-top:14px;}
  .predgoal{font-size:15px;font-weight:800;color:#004d40;margin-bottom:10px;}
  .caldate{display:flex;align-items:center;gap:11px;}
  .cal{width:44px;height:48px;border-radius:8px;background:#fff;border:1px solid #cfe0d4;overflow:hidden;text-align:center;flex:0 0 auto;}
  .cal .m{background:var(--grn);color:#fff;font-size:9px;font-weight:800;padding:2px;} .cal .d{font-size:20px;font-weight:800;color:var(--grnd);font-family:'Inter';line-height:1.35;}
  .caldate .h{font-size:14px;font-weight:800;color:#2b2620;} .caldate .s{font-size:11px;color:#6a6256;margin-top:2px;}
  /* アウトライン計算ボタン */
  .calcbtn{display:block;width:100%;margin-top:10px;background:#fff;color:var(--grnd);border:2px solid var(--grn);border-radius:12px;padding:11px;font-size:13px;font-weight:800;text-align:center;cursor:pointer;font-family:inherit;}
  .banote{font-size:10px;color:var(--ink3);text-align:center;margin-top:14px;padding-top:12px;border-top:1px dashed #d8cdba;}
  /* 計算シート */
  .dim{position:absolute;inset:0;background:rgba(20,16,10,.45);}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--bg);border-radius:22px 22px 0 0;padding:8px 18px 24px;box-shadow:0 -8px 24px rgba(0,0,0,.2);}
  .grip{width:38px;height:4px;background:#cabfa9;border-radius:3px;margin:0 auto 14px;}
  .sheet h3{font-size:15px;font-weight:800;color:var(--grnd);text-align:center;margin-bottom:14px;}
  .inrow{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;}
  .inrow .lbl{font-size:12px;color:#6a6256;font-weight:700;}
  .inrow .box{font-size:26px;font-weight:800;font-family:'Inter';color:#2b2620;border-bottom:2px solid var(--grn);padding:0 10px;min-width:74px;text-align:center;}
  .inrow .unit{font-size:13px;color:#6a6256;font-weight:700;}
  .result{background:linear-gradient(135deg,#eef5f0,#fffbe6);border:1px solid #d7e6db;border-radius:14px;padding:16px;text-align:center;}
  .result .big{font-size:26px;font-weight:800;color:#004d40;font-family:'Inter';}
  .result .sub{font-size:13px;color:#2b2620;font-weight:800;margin-top:6px;}
  .result .note{font-size:11px;color:#6a6256;margin-top:8px;}
  .foot{max-width:900px;margin:22px auto 0;font-size:11px;color:#7a6f5c;line-height:1.8;text-align:center;}
</style>
</head>
<body>
<div class="head">
  <h1>体組成 詳細 ・ 確定版（style2 フラット）</h1>
  <p>体重タブ。3カラム＝入会時/現在/目標、ピル2つ、予測カードはA（最終目標のみ・見出しなし・文字均一）。<br>予測カードの「重複行」を <b>残す版 / 落とす版</b> で並べています。右端は計算ボタンのシート。</p>
</div>
<div class="cols" id="root"></div>
<div class="foot">
  ・予測はすべて実測ペース（週 -0.4kg）ベース。増加中・停滞中は日付を出さず「記録を続けよう」に切替。<br>
  ・「体重を指定して計算する」→ 下からシートがせり上がり、任意の体重を入れて逆算（例：67kgならあと約24日）。<br>
  ・数値はサンプル。ビフォーアフター写真は banote の下（ウエスト＋写真タブ側）に共通で入ります。
</div>

<script>
const HDR = `<div class="hdr"><span class="back">‹ 体組成</span><span class="t">体型変化の記録</span><span style="width:18px"></span></div>`;
const PILL = `<div class="pill"><span class="on">体重</span><span>ウエスト＋写真</span></div>`;
const ringSvg = (sz=124,sw=10)=>{const r=sz/2-sw-2;const c=2*Math.PI*r;return `<svg width="${sz}" height="${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#eadfce" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#4a875b" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c/2}" transform="rotate(-90 ${sz/2} ${sz/2})"/></svg>`;};
const RING = `<div class="ringwrap"><div class="ringbox">${ringSvg()}<div class="n"><b>68.4</b><s>kg ・ 達成50%</s></div></div></div>`;
const COLS3 = `<div class="cols3"><span>入会時<b>71.8</b></span><span>現在<b class="g">68.4</b></span><span>目標<b class="g">65.0</b></span></div>`;
const PILLS2 = `<div class="pills2"><div class="p"><span class="l">目標まで</span><span class="v">あと 3.4kg</span></div><div class="p"><span class="l">現状ペース</span><span class="v">-0.4kg/週</span></div></div>`;
const GRAPH = `<div class="sec">数値の推移</div><div class="graph"><svg class="line" viewBox="0 0 300 96"><line x1="10" y1="20" x2="290" y2="20" stroke="#ddd6c6" stroke-width="1" stroke-dasharray="4 4"/><text x="12" y="16" font-size="9" fill="#4a875b">目標 65.0</text><polyline points="15,36 60,42 105,39 150,52 195,58 240,68 285,74" fill="none" stroke="#2b2620" stroke-width="2.5"/><circle cx="285" cy="74" r="4" fill="#34603f"/></svg></div>`;
const CALCBTN = `<button class="calcbtn">＋ 体重を指定して計算する</button>`;
const BANOTE = `<div class="banote">↓ ビフォーアフター写真は「ウエスト＋写真」タブに共通で入ります</div>`;
// 予測カード: 残す版（重複行あり・文字均一）
const PRED_KEEP = `<div class="pred">
  <div class="predgoal">65.0kg まで あと 8.5週間</div>
  <div class="caldate"><div class="cal"><div class="m">9月</div><div class="d">5</div></div><div><div class="h">9月上旬ごろ 達成見込み</div><div class="s">今のペースであと約60日です</div></div></div>
</div>`;
// 予測カード: 落とす版（重複行なし）
const PRED_DROP = `<div class="pred">
  <div class="caldate"><div class="cal"><div class="m">9月</div><div class="d">5</div></div><div><div class="h">9月上旬ごろ 達成見込み</div><div class="s">今のペースであと約60日です</div></div></div>
</div>`;

const body = pred => `${RING}${COLS3}${PILLS2}${GRAPH}${pred}${CALCBTN}${BANOTE}`;
const phone = inner => `<div class="phone"><div class="sbar">9:41</div><div class="scr">${HDR}${PILL}${inner}</div></div>`;

// 計算シート付きの端末
const sheetPhone = `<div class="phone"><div class="sbar">9:41</div><div class="scr">${HDR}${PILL}${RING}${COLS3}</div>
  <div class="dim"></div>
  <div class="sheet">
    <div class="grip"></div>
    <h3>体重を指定して計算</h3>
    <div class="inrow"><span class="lbl">目標体重</span><span class="box">67.0</span><span class="unit">kg</span></div>
    <div class="result">
      <div>67.0kg まで</div>
      <div class="big">あと 約24日</div>
      <div class="sub">📅 7月下旬ごろ 見込み</div>
      <div class="note">現状ペース -0.4kg/週 で逆算</div>
    </div>
  </div>
</div>`;

document.getElementById('root').innerHTML = `
  <div class="col"><div class="cap">A-1 ・ 重複行を残す</div><div class="capsub">「65.0kg まで あと8.5週間」を残す。文字は全て同じ大きさ。ただし下の「約60日」とほぼ同義。</div>${phone(body(PRED_KEEP))}</div>
  <div class="col"><div class="cap">A-2 ・ 重複行を落とす</div><div class="capsub">重複行を消し、達成見込み日＋「あと約60日」に集約。すっきり。私のおすすめ。</div>${phone(body(PRED_DROP))}</div>
  <div class="col"><div class="cap">計算シート（共通）</div><div class="capsub">アウトラインボタン → 下からふわっとせり上がる。体重を入れて逆算。</div>${sheetPhone}</div>
`;
</script>
</body>
</html>
