/* ===== 共通レンダリング ===== */
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function renderRecipeBody(r, opts){
  var noBtn = opts && opts.noCopyBtn;
  var html='';
  if(r.nutrition && Object.keys(r.nutrition).length){
    var rows='';
    for(var k in r.nutrition){ rows += '<div class="rcp-nut-row"><span class="k">'+escapeHtml(k)+'</span><span class="v">'+escapeHtml(r.nutrition[k])+'</span></div>'; }
    var por = r.portion ? '<div class="rcp-nut-portion">📊 '+escapeHtml(r.portion)+'</div>' : '<div class="rcp-nut-portion">📊 栄養成分</div>';
    html += '<div class="rcp-section"><div class="rcp-section-title">📊 栄養成分</div><div class="rcp-nut">'+por+rows+'</div></div>';
  }
  if(r.ingredients && r.ingredients.length){
    var lis = r.ingredients.map(function(it){return '<li class="rcp-ing-li">'+escapeHtml(it)+'</li>';}).join('');
    var copyText = r.ingredients.map(function(it){return '・'+it;}).join('\n');
    var btn = noBtn ? '' :
      '<button type="button" class="rcp-copy-btn" data-copy-text="'+escapeHtml(copyText)+'">'+
      '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'+
      '<span>🛒 買い物リストをコピー</span></button>';
    html += '<div class="rcp-section"><div class="rcp-section-title">🛒 材料</div><ul class="rcp-ing">'+lis+'</ul>'+btn+'</div>';
  }
  if(r.steps && r.steps.length){
    var sli = r.steps.map(function(s,i){return '<li class="rcp-step"><span class="rcp-step-num">'+(i+1)+'</span><span>'+escapeHtml(s)+'</span></li>';}).join('');
    html += '<div class="rcp-section"><div class="rcp-section-title">👨‍🍳 作り方</div><ol class="rcp-steps">'+sli+'</ol></div>';
  }
  if(r.note){ html += '<div class="rcp-note">'+escapeHtml(r.note)+'</div>'; }
  return html;
}

/* レシピ全体をコピペ向けプレーンテキストに整形 */
function buildRecipeCopyText(r){
  var lines = [];
  lines.push('【'+r.theme+'】');
  if(r.isOverview && r.overviewText){
    lines.push('');
    lines.push(r.overviewText);
    return lines.join('\n').trim();
  }
  lines.push('');
  if(r.nutrition && Object.keys(r.nutrition).length){
    lines.push('📊 栄養成分'+(r.portion?'（'+r.portion+'）':''));
    for(var k in r.nutrition){ lines.push('・'+k+': '+r.nutrition[k]); }
    lines.push('');
  }
  if(r.ingredients && r.ingredients.length){
    lines.push('🛒 材料');
    r.ingredients.forEach(function(it){ lines.push('・'+it); });
    lines.push('');
  }
  if(r.steps && r.steps.length){
    lines.push('👨‍🍳 作り方');
    r.steps.forEach(function(s,i){ lines.push((i+1)+'. '+s); });
    lines.push('');
  }
  if(r.note){ lines.push('💡 '+r.note); }
  return lines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}

   特典9: 概要 + 買い溜めリスト + 和食レシピ9 = 11アイテム */
function buildTextOnly(){
  var section = document.getElementById('recipeTextOnlySection');
  if (!section) return;

  var allItems = [];

  // 1. 概要（cの1枚目）※コピーボタン無し
  var overviewItem = washokuRecipes.find(function(r){return r.isOverview;});
  if(overviewItem){
    allItems.push({
      label: overviewItem.theme,
      innerHtml: '<div class="rcp-note" style="margin:0">'+escapeHtml(overviewItem.overviewText)+'</div>',
      noCopy: true
    });
  }

  // 2. 1週間買い溜めリスト
  allItems.push({
    label: '1週間買い溜めリスト',
    innerHtml: '<div class="rcp-section"><div class="rcp-section-title">🛒 買い溜めリスト</div>' +
      '<div class="t09-shop-list" style="margin-top:0"><pre>'+escapeHtml(shoppingListText)+'</pre></div></div>',
    copyText: shoppingListText
  });

  // 3. 和食スタメンレシピ9品（概要除く）
  washokuRecipes.filter(function(r){return !r.isOverview;}).forEach(function(r){
    allItems.push({
      label: r.theme,
      innerHtml: renderRecipeBody(r, {noCopyBtn: true}),
      copyText: buildRecipeCopyText(r)
    });
  });

  var items = allItems.map(function(it){
    var inner = it.innerHtml;
    if(!it.noCopy){
      inner += '<div class="rcp-section" style="margin-top:14px;text-align:center">' +
        '<button type="button" class="rcp-copy-btn rcp-copy-full" data-copy-text="'+escapeHtml(it.copyText)+'" style="background:#b8860b;padding:10px 18px;font-size:12.5px">' +
        '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
        '<span>📋 このレシピをまるごとコピー</span></button></div>';
    }
    return '<div class="rcp-textonly-item">' +
      '<div class="rcp-textonly-item-head"><span class="rcp-textonly-item-label">'+escapeHtml(it.label)+'</span><span class="rcp-textonly-item-arr">▼</span></div>' +
      '<div class="rcp-textonly-item-body"><div class="rcp-textonly-item-inner">'+inner+'</div></div>' +
      '</div>';
  }).join('');

  section.innerHTML =
    '<div class="rcp-textonly">' +
      '<div class="rcp-textonly-head">' +
        '<div class="rcp-textonly-label">📋 レシピのみ一覧を見る（テキスト）</div>' +
        '<span class="rcp-textonly-arr">▼</span>' +
      '</div>' +
      '<div class="rcp-textonly-body"><div class="rcp-textonly-list">'+items+'</div></div>' +
    '</div>';
  section.querySelector('.rcp-textonly-head').addEventListener('click', function(){ section.querySelector('.rcp-textonly').classList.toggle('open'); });
  section.querySelectorAll('.rcp-textonly-item-head').forEach(function(h){
    h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); });
  });
}

              '<span>🛒 買い溜めリストをコピー</span></button>' +
            '</div>' +
          '</div></div>' +
        '</div>' +
      '</div></div>' +
    '</div>';

  // c: 和食スタメンレシピ解説（画像 + 各画像下にレシピ解説アコーディオン）
  // 概要画像（isOverview）はアコーディオン無しで画像下に直接テキスト表示
  var cImgs = washokuRecipes.map(function(r){
    var detail = '';
    if(r.isOverview){
      detail = '<div class="t09-overview-note">'+escapeHtml(r.overviewText)+'</div>';
    } else {
      detail = '<div class="t09-rec-detail">' +
        '<div class="t09-rec-detail-head"><span class="t09-rec-detail-label">📋 '+escapeHtml(r.theme)+' のレシピ解説</span><span class="t09-rec-detail-arr">▼</span></div>' +
        '<div class="t09-rec-detail-body"><div class="t09-rec-detail-inner">'+renderRecipeBody(r)+'</div></div>' +
      '</div>';
    }
    return '<div class="img-item">' +
      '<img src="'+r.image+'" alt="'+escapeHtml(r.theme)+'" loading="lazy">' +
      detail +
    '</div>';
  }).join('');
  var cHtml =
    '<div class="img-ac" id="t09AcC">' +
      '<div class="img-ac-head" data-target="t09AcC">' +
        '<div class="img-ac-label">' +
          '<svg viewBox="0 0 24 24"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><line x1="9" y1="3" x2="9" y2="21"/></svg>' +
          'c. 和食スタメンレシピ解説' +
        '</div>' +
        '<div class="img-ac-meta"><span class="img-ac-count">'+washokuRecipes.length+'品</span><div class="img-ac-arr"><svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg></div></div>' +
      '</div>' +
      '<div class="img-ac-body"><div class="img-list">' + cImgs + '</div></div>' +
    '</div>';

  root.innerHTML = aHtml + bHtml + cHtml;

  // 外側アコーディオン（a/b/c）
  root.querySelectorAll('.img-ac-head').forEach(function(h){
    h.addEventListener('click', function(){
      var target = h.getAttribute('data-target');
      document.getElementById(target).classList.toggle('open');
    });
  });

  // c内の各レシピ解説アコーディオン
  root.querySelectorAll('.t09-rec-detail-head').forEach(function(h){
    h.addEventListener('click', function(){
      h.parentElement.classList.toggle('open');
    });
  });
}

function toggleImgAc(){}

/* コピーボタン挙動 */
document.addEventListener('click', function(e){
  var btn = e.target.closest('.rcp-copy-btn'); if(!btn) return;
  var text = btn.getAttribute('data-copy-text'); if(!text) return;
  var span = btn.querySelector('span'); var orig = span ? span.textContent : '';
  var done = function(){ btn.classList.add('is-copied'); if(span) span.textContent='✓ コピーしました'; setTimeout(function(){btn.classList.remove('is-copied'); if(span) span.textContent=orig;},1800); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(function(){fbCopy(text,done);}); }
  else { fbCopy(text,done); }
});
function fbCopy(t,cb){var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');cb&&cb();}catch(e){}document.body.removeChild(ta);}

function getUID(){
  var p=new URLSearchParams(window.location.search);

}
function saveToSheet(uid){
  try{fetch(GAS_URL,{method:'POST',body:JSON.stringify({uid:uid,tokuten:TOK_NUM,title:TOK_TITLE}),headers:{'Content-Type':'application/json'}});}catch(e){}
}
function markDone(){
  var btn=document.getElementById('uBtn'),nxt=document.getElementById('uNext');
  if(btn.classList.contains('done'))return;
  btn.classList.add('done');
  btn.innerHTML='<svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5"><polyline points="20,6 9,17 4,12"/></svg> 確認完了！';
  nxt.style.display='block';
  try{localStorage.setItem(TOK_KEY,'1');saveToSheet(getUID());}catch(e){}
}
