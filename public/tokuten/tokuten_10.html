/* ===== 共通 ===== */
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function renderRecipeBody(r){
  var html='';
  if(r.effect){ html += '<div class="rcp-effect">'+escapeHtml(r.effect)+'</div>'; }
  if(r.ingredients && r.ingredients.length){
    var lis = r.ingredients.map(function(it){return '<li class="rcp-ing-li">'+escapeHtml(it)+'</li>';}).join('');
    var copyText = r.ingredients.map(function(it){return '・'+it;}).join('\n');
    html += '<div class="rcp-section"><div class="rcp-section-title">🛒 材料</div><ul class="rcp-ing">'+lis+'</ul>'+
      '<button type="button" class="rcp-copy-btn" data-copy-text="'+escapeHtml(copyText)+'">'+
      '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'+
      '<span>🛒 買い物リストをコピー</span></button></div>';
  }
  if(r.steps && r.steps.length){
    var sli = r.steps.map(function(s,i){return '<li class="rcp-step"><span class="rcp-step-num">'+(i+1)+'</span><span>'+escapeHtml(s)+'</span></li>';}).join('');
    html += '<div class="rcp-section"><div class="rcp-section-title">👨‍🍳 作り方</div><ol class="rcp-steps">'+sli+'</ol></div>';
  }
  if(r.note){ html += '<div class="rcp-note">'+escapeHtml(r.note)+'</div>'; }
  return html;
}

/* 画像 + 解説アコーディオンを構築（各画像下にアコーディオン・初期閉じ）
   概要画像（isOverview）はアコーディオン無しで直接表示 */
function buildImages(){
  var list = document.getElementById('imgList');
  var countEl = document.getElementById('imgCount');
  if(recipeData.length === 0){ countEl.textContent = ''; return; }
  countEl.textContent = recipeData.length + '枚';
  recipeData.forEach(function(r, i){
    var item = document.createElement('div');
    item.className = 'img-item';
    var detail = '';
    if(r.isOverview){
      detail = '<div class="t09-overview-note" style="margin:10px 12px 12px;background:#fff3e0;border-left:3px solid var(--g2);border-radius:6px;padding:10px 12px;font-size:13px;line-height:1.7;color:var(--txt2);font-weight:500">💡 ' + escapeHtml(r.overviewText) + '</div>';
    } else {
      detail = '<div class="t10-rec-detail">' +
        '<div class="t10-rec-detail-head"><span class="t10-rec-detail-label">📋 ' + escapeHtml(r.theme) + ' のレシピ解説</span><span class="t10-rec-detail-arr">▼</span></div>' +
        '<div class="t10-rec-detail-body"><div class="t10-rec-detail-inner">' + renderRecipeBody(r) + '</div></div>' +
      '</div>';
    }
    item.innerHTML = '<img src="' + r.image + '" alt="' + escapeHtml(r.theme) + '" loading="lazy">' + detail;
    list.appendChild(item);
  });
  // 各レシピ解説アコーディオンの開閉
  list.querySelectorAll('.t10-rec-detail-head').forEach(function(h){
    h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); });
  });
}

/* レシピ全体をコピペ向けプレーンテキストに整形 */
function buildRecipeCopyText(r){
  var lines = [];
  lines.push('【'+r.theme+'】');
  if(r.isOverview && r.overviewText){
    lines.push('');
    lines.push(r.overviewText);
    return lines.join('\n').trim();
  }
  lines.push('');
  if(r.effect){ lines.push('✨ '+r.effect); lines.push(''); }
  if(r.ingredients && r.ingredients.length){
    lines.push('🛒 材料');
    r.ingredients.forEach(function(it){ lines.push('・'+it); });
    lines.push('');
  }
  if(r.steps && r.steps.length){
    lines.push('👨‍🍳 作り方');
    r.steps.forEach(function(s,i){ lines.push((i+1)+'. '+s); });
    lines.push('');
  }
  if(r.note){ lines.push('💡 '+r.note); }
  return lines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}

/* レシピのみ一覧（テキスト・二段アコーディオン）
   特典10: 概要 + 5レシピ = 6アイテム */
function buildTextOnly(){
  var section = document.getElementById('recipeTextOnlySection');
  if (!section) return;

  var items = recipeData.map(function(r){
    var inner;
    if(r.isOverview){
      inner = '<div class="rcp-note" style="margin:0">'+escapeHtml(r.overviewText)+'</div>';
    } else {
      inner = '';
      if(r.effect){ inner += '<div class="rcp-effect">'+escapeHtml(r.effect)+'</div>'; }
      if(r.ingredients && r.ingredients.length){
        var lis = r.ingredients.map(function(it){return '<li class="rcp-ing-li">'+escapeHtml(it)+'</li>';}).join('');
        inner += '<div class="rcp-section"><div class="rcp-section-title">🛒 材料</div><ul class="rcp-ing">'+lis+'</ul></div>';
      }
      if(r.steps && r.steps.length){
        var sli = r.steps.map(function(s,i){return '<li class="rcp-step"><span class="rcp-step-num">'+(i+1)+'</span><span>'+escapeHtml(s)+'</span></li>';}).join('');
        inner += '<div class="rcp-section"><div class="rcp-section-title">👨‍🍳 作り方</div><ol class="rcp-steps">'+sli+'</ol></div>';
      }
      if(r.note){ inner += '<div class="rcp-note">'+escapeHtml(r.note)+'</div>'; }
    }
    if(!r.isOverview){
      var fullText = buildRecipeCopyText(r);
      inner += '<div class="rcp-section" style="margin-top:14px;text-align:center">' +
        '<button type="button" class="rcp-copy-btn rcp-copy-full" data-copy-text="'+escapeHtml(fullText)+'" style="background:#b8860b;padding:10px 18px;font-size:12.5px">' +
        '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
        '<span>📋 このレシピをまるごとコピー</span></button></div>';
    }
    return '<div class="rcp-textonly-item">' +
      '<div class="rcp-textonly-item-head"><span class="rcp-textonly-item-label">'+escapeHtml(r.theme)+'</span><span class="rcp-textonly-item-arr">▼</span></div>' +
      '<div class="rcp-textonly-item-body"><div class="rcp-textonly-item-inner">'+inner+'</div></div>' +
      '</div>';
  }).join('');

  section.innerHTML =
    '<div class="rcp-textonly">' +
      '<div class="rcp-textonly-head">' +
        '<div class="rcp-textonly-label">📋 レシピのみ一覧を見る（テキスト）</div>' +
        '<span class="rcp-textonly-arr">▼</span>' +
      '</div>' +
      '<div class="rcp-textonly-body"><div class="rcp-textonly-list">'+items+'</div></div>' +
    '</div>';
  section.querySelector('.rcp-textonly-head').addEventListener('click', function(){ section.querySelector('.rcp-textonly').classList.toggle('open'); });
  section.querySelectorAll('.rcp-textonly-item-head').forEach(function(h){
    h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); });
  });
}

/* コピーボタン挙動（イベント委譲） */
document.addEventListener('click', function(e){
  var btn = e.target.closest('.rcp-copy-btn'); if(!btn) return;
  var text = btn.getAttribute('data-copy-text'); if(!text) return;
  var span = btn.querySelector('span'); var orig = span ? span.textContent : '';
  var done = function(){ btn.classList.add('is-copied'); if(span) span.textContent='✓ コピーしました'; setTimeout(function(){btn.classList.remove('is-copied'); if(span) span.textContent=orig;},1800); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(function(){fbCopy(text,done);}); }
  else { fbCopy(text,done); }
});
function fbCopy(t,cb){var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');cb&&cb();}catch(e){}document.body.removeChild(ta);}
