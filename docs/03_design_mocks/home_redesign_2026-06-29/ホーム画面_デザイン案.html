<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>筋肉塾 ホーム画面 デザイン案</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#e9e7e2;font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;color:#2b2620;padding:18px;-webkit-font-smoothing:antialiased;}
  .wrap{display:flex;gap:22px;align-items:flex-start;justify-content:center;max-width:760px;margin:0 auto;}
  /* 左コントロール */
  .panel{width:268px;flex-shrink:0;background:#fff;border-radius:14px;padding:15px 16px;box-shadow:0 2px 12px rgba(0,0,0,.07);position:sticky;top:18px;}
  .panel .title{font-size:14px;font-weight:800;color:#004d40;margin-bottom:12px;}
  .panel .pg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .panel .pat{text-align:left;border:1px solid #d8d2c4;background:#fff;border-radius:8px;padding:8px 11px;font-size:12.5px;font-weight:700;color:#4a4034;cursor:pointer;}
  .panel .pat.on{background:#4a875b;border-color:#4a875b;color:#fff;}
  .panel .lab{font-size:11px;font-weight:800;color:#3f3a32;margin:0 0 5px;}
  .panel .sub{margin-bottom:11px;}
  .row1{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{border:1px solid #d8d2c4;background:#fff;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;color:#4a4034;cursor:pointer;}
  .chip.on{background:#34603f;border-color:#34603f;color:#fff;}

  /* 右プレビュー */
  .phone{width:390px;flex-shrink:0;background:#f9f5ed;border-radius:26px;overflow:hidden;box-shadow:0 18px 48px rgba(0,0,0,.22);border:1px solid #e7dcc9;}
  .hd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:#fffdf8;border-bottom:1px solid #e7dcc9;}
  .hd .logo{font-size:16px;font-weight:800;color:#004d40;letter-spacing:.04em;}
  .hd .cog{width:23px;height:23px;color:#6a6256;}
  .body{padding:12px;display:flex;flex-direction:column;gap:10px;}
  .card{background:#fffdf8;border:1px solid #e7dcc9;border-radius:15px;}
  .hi{font-size:15px;font-weight:800;padding:2px 2px 0;}
  .sec{font-size:11px;font-weight:800;color:#34603f;display:flex;align-items:center;gap:6px;padding:4px 2px 0;}
  .sec::before{content:"";width:3px;height:13px;background:#4a875b;border-radius:2px;}
  .alertbar{display:flex;align-items:center;gap:8px;background:#fffbe6;border:1px solid #f0e0a8;border-radius:11px;padding:8px 11px;font-size:11.5px;color:#8a6d1f;}
  .alertbar .ab{font-size:8px;font-weight:800;background:#caa12f;color:#fff;border-radius:999px;padding:1px 6px;margin-left:auto;}
  .cap{font-size:10px;font-weight:800;color:#6a6256;letter-spacing:.05em;}
  .t1{font-size:14px;font-weight:700;}
  .pill{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;background:#4a875b;color:#fff;}
  .gobtn{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;}
  .u{font-size:11px;color:#6a6256;font-weight:700;}

  /* アイコン箱 */
  .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ic svg{width:17px;height:17px;}
  .ic.big{width:42px;height:42px;border-radius:12px;}
  .ic.big svg{width:23px;height:23px;}
  .ic.sm{width:26px;height:26px;border-radius:8px;}
  .ic.sm svg{width:15px;height:15px;}

  /* 掲示板 */
  .board{background:#fffdf8;border:1px solid #e7dcc9;border-radius:15px;padding:11px 13px;}
  .board .bhd{font-size:10.5px;font-weight:800;color:#34603f;margin-bottom:8px;}
  .note{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;}
  .note+.note{border-top:1px solid #f3eddf;}
  .note .dot{width:6px;height:6px;border-radius:50%;background:#4a875b;flex-shrink:0;}
  .note .nb{font-size:8px;font-weight:800;background:#c2693f;color:#fff;border-radius:999px;padding:1px 5px;margin-left:auto;}
  .bscroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .bcard{flex:0 0 auto;width:150px;background:#f8f9fa;border:1px solid #eee4d4;border-radius:11px;padding:9px 10px;font-size:11px;}
  .bhi{background:#eef4f0;border:1px solid #cfe3d6;border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:9px;}

  /* 体組成 */
  .bmrow{display:flex;align-items:baseline;gap:8px;padding:5px 0;}
  .bmrow+.bmrow{border-top:1px dashed #ede5d4;}
  .bmrow .lbl{width:36px;font-size:11px;color:#a59b8c;font-weight:700;}
  .bmrow .num{font-size:27px;font-weight:800;color:#34603f;line-height:1;}
  .bmrow .goal{margin-left:auto;font-size:11px;color:#6a6256;}
  .bmrow .goal b{color:#c2693f;font-size:13px;}
  .recbtn{margin-top:9px;display:block;text-align:center;background:#4a875b;color:#fff;border-radius:10px;padding:8px;font-size:11.5px;font-weight:700;}
  .bmmini{display:flex;gap:12px;align-items:center;}
  .bmmini .n{font-size:21px;font-weight:800;color:#34603f;}
  .bmmini .g{font-size:9px;color:#c2693f;font-weight:700;}

  .slim{padding:12px 13px;}
  .train{background:linear-gradient(135deg,#e8f3ec,#fffbe6);border:1px solid #cfe3d6;}

  .pb{height:7px;background:#eee4d4;border-radius:999px;overflow:hidden;margin:7px 0;}
  .pf{height:100%;width:35%;background:#4a875b;border-radius:999px;}
  .three{display:flex;gap:8px;}
  .three .b{flex:1;text-align:center;background:#f8f9fa;border:1px solid #eee4d4;border-radius:10px;padding:7px 4px;}
  .three .n{font-size:16px;font-weight:800;color:#34603f;}
  .three .l{font-size:8.5px;color:#6a6256;margin-top:1px;}
  .donut{width:62px;height:62px;border-radius:50%;background:conic-gradient(#4a875b 0 35%,#eee4d4 35% 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .donut .in{width:46px;height:46px;border-radius:50%;background:#fffdf8;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#34603f;}

  .row{display:flex;align-items:center;gap:10px;padding:11px 13px;}
  .row+.row{border-top:1px solid #f0ead9;}
  .row .g{flex:1;min-width:0;}
  .row .rt{font-size:12.5px;font-weight:700;}
  .row .rs{font-size:10px;color:#6a6256;margin-top:1px;}
  .row .ar{color:#c9bfa9;}
  .nb{font-size:8px;font-weight:800;background:#c2693f;color:#fff;border-radius:999px;padding:1px 5px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
  .tile{background:#fffdf8;border:1px solid #e7dcc9;border-radius:13px;padding:11px;position:relative;min-height:74px;display:flex;flex-direction:column;justify-content:space-between;gap:8px;}
  .tile.s{min-height:64px;padding:9px;gap:5px;}
  .tile.big{min-height:100px;padding:13px;border-radius:16px;gap:10px;}
  .tile .tl{font-size:11.5px;font-weight:700;}
  .tile.s .tl{font-size:10.5px;}
  .tile.big .tl{font-size:13px;}
  .tile .ts{font-size:9px;color:#6a6256;margin-top:1px;}
  .tile .tnb{position:absolute;top:6px;right:6px;}
  .more{text-align:center;background:#fffdf8;border:1px dashed #cfc8b8;border-radius:12px;padding:10px;font-size:11.5px;font-weight:700;color:#6a6256;}

  .nav{display:flex;background:#fffdf8;border-top:1px solid #e7dcc9;}
  .nav .tab{flex:1;text-align:center;padding:7px 0 9px;font-size:9px;color:#a59b8c;font-weight:600;}
  .nav .tab.on{color:#34603f;}
  .nav .tab .d{width:19px;height:19px;border-radius:6px;background:#eee4d4;margin:0 auto 3px;}
  .nav .tab.on .d{background:#4a875b;}
  .tabbar{max-width:760px;margin:0 auto 14px;display:flex;gap:8px;background:#fff;border-radius:12px;padding:8px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .tabbar .tb{flex:1;border:none;background:transparent;border-radius:8px;padding:11px;font-size:13px;font-weight:800;color:#6a6256;cursor:pointer;}
  .tabbar .tb.on{background:#4a875b;color:#fff;}
  .foodwrap{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:1180px;margin:0 auto;}
  .ff-label{text-align:center;font-size:12.5px;font-weight:800;color:#34603f;margin-bottom:7px;}
  .foodwrap .ff-sec{width:100%;text-align:center;font-size:14px;font-weight:800;color:#1c1a16;margin:10px 0 2px;}
  .ff{width:360px;background:#f9f5ed;border-radius:22px;overflow:hidden;border:1px solid #e7dcc9;box-shadow:0 12px 32px rgba(0,0,0,.14);}
</style>
</head>
<body>
<div class="tabbar">
  <button class="tb on" data-tab="home" onclick="setTab('home')">ホーム画面</button>
  <button class="tb" data-tab="food" onclick="setTab('food')">食事</button>
  <button class="tb" data-tab="body" onclick="setTab('body')">体型変化の記録</button>
</div>
<div id="homeview">
<div class="wrap">
  <div class="panel">
    <div class="title">筋肉塾 ホーム画面 デザイン案</div>
    <div class="pg" id="pats"></div>
    <div class="sub"><div class="lab">体組成の見せ方</div><div class="row1" id="bms"></div></div>
    <div class="sub"><div class="lab">続きから 背景</div><div class="row1" id="cols"></div></div>
    <div class="sub"><div class="lab">学習進捗の見せ方</div><div class="row1" id="progs"></div></div>
    <div class="sub"><div class="lab">掲示板の見せ方</div><div class="row1" id="boards"></div></div>
    <div class="sub"><div class="lab">アイコン</div><div class="row1" id="icons"></div></div>
  </div>
  <div class="phone"><div id="screen"></div>
    <div class="nav" id="nav"></div>
  </div>
</div>
</div>
<div id="foodview" style="display:none">
  <div class="foodwrap" id="foodwrap"></div>
</div>
<div id="bodyview" style="display:none">
  <div class="foodwrap" id="bodywrap"></div>
</div>

<script>
const COG='<svg class="cog" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
const HD=`<div class="hd"><div class="logo">筋肉塾</div>${COG}</div>`;

// ===== SVG アイコン定義 (線画) + カラー =====
const SVG={
 food:'<path d="M4 11h16a8 8 0 0 1-16 0z"/><path d="M3 11h18"/><path d="M8 4v3"/><path d="M11 4v3"/>',
 bmrec:'<path d="M3 3v18h18"/><path d="M7 14l3-4 3 2 4-6"/>',
 course:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/>',
 learn:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6"/><path d="M9 17h4"/>',
 tools:'<rect x="5" y="3" width="14" height="18" rx="2"/><rect x="8" y="6" width="8" height="3" rx="0.5"/><path d="M9 13h.01M12 13h.01M15 13h.01M9 16h.01M12 16h.01M15 16h.01"/>',
 monthly:'<rect x="2" y="4" width="20" height="16" rx="2"/><polygon points="10 9 15 12 10 15" fill="currentColor" stroke="none"/>',
 chat:'<path d="M21 11.5a8.38 8.38 0 0 1-9 8.3 8.5 8.5 0 0 1-3.9-.9L3 21l1.9-5.1A8.38 8.38 0 0 1 12 3a8.5 8.5 0 0 1 9 8.5z"/>',
 form:'<circle cx="12" cy="12" r="9"/><polygon points="10 9 15 12 10 15" fill="currentColor" stroke="none"/>',
 protein:'<path d="M8 2h8"/><path d="M9 2c0 2-2 3-2 6v11a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V8c0-3-2-4-2-6"/><path d="M7 12h10"/>',
 goal:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>',
 bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.5 21a1.8 1.8 0 0 1-3 0"/>',
};
const COLOR={
 food:{c:'#e0832f',b:'#fdf0e2'}, bmrec:{c:'#2f9e8f',b:'#e2f3f0'}, course:{c:'#3a6ea5',b:'#e8f0fa'},
 learn:{c:'#4a875b',b:'#eaf3ec'}, tools:{c:'#7a5af0',b:'#efeafd'}, monthly:{c:'#d6536a',b:'#fbe9ee'},
 chat:{c:'#2aa7c4',b:'#e2f3f8'}, form:{c:'#c98a1e',b:'#fbf2dd'}, protein:{c:'#c2693f',b:'#f7ebe3'},
 goal:{c:'#2f7d6b',b:'#e3f1ee'}, bell:{c:'#a5631f',b:'#fbf3e2'},
};
function ico(k,sz){ // sz: ''|'big'|'sm'
 const line = ST.icon==='line';
 const col = line ? '#4a875b' : COLOR[k].c;
 const bg  = line ? '#eef4f0' : COLOR[k].b;
 return `<span class="ic ${sz||''}" style="color:${col};background:${bg}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${SVG[k]}</svg></span>`;
}

const alertBar=`<div class="alertbar">目標管理シートが未記入です ・ タップして記入<span class="ab">!</span></div>`;

// ===== 掲示板 5パターン (時刻なし) =====
const NOTES=[{k:'monthly',t:'月次添削の動画が届きました',nb:1},{k:'food',t:'昨日の食事添削に返信しました',nb:0}];
function board(){
 const s=ST.board, h=`<div class="bhd">のりfitnessから</div>`;
 if(s==1)return `<div class="board">${h}${NOTES.map(n=>`<div class="note"><span class="dot"></span>${n.t}${n.nb?'<span class="nb">NEW</span>':''}</div>`).join('')}</div>`;
 if(s==2)return `<div class="board">${h}${NOTES.map(n=>`<div class="note">${ico(n.k,'sm')}<span>${n.t}</span>${n.nb?'<span class="nb">NEW</span>':''}</div>`).join('')}</div>`;
 if(s==3)return `<div class="board" style="padding:9px 13px"><div class="note" style="padding:2px 0;border:none">${ico('bell','sm')}<span>お知らせが届いています</span><span class="nb">${NOTES.length}件 ▾</span></div></div>`;
 if(s==4)return `<div class="board">${h}<div class="bscroll">${NOTES.map(n=>`<div class="bcard">${ico(n.k,'sm')}<div style="margin-top:5px">${n.t}${n.nb?' <span class="nb">NEW</span>':''}</div></div>`).join('')}</div></div>`;
 return `<div class="board">${h}<div class="bhi">${ico('monthly','big')}<div style="flex:1"><div style="font-size:12.5px;font-weight:700">月次添削の動画が届きました <span class="nb">NEW</span></div></div></div><div class="note" style="margin-top:2px">${ico('food','sm')}<span>昨日の食事添削に返信しました</span></div></div>`;
}

const bm=()=>{
 const head=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="cap">今のからだ</span><span style="font-size:10px;color:#4a875b;font-weight:700">詳細・グラフ →</span></div>`;
 const rec=`<span class="recbtn">タップして記録 ・ グラフを見る</span>`, s=ST.bm;
 if(s==1)return `<div class="card" style="padding:12px 13px">${head}<div class="bmrow"><span class="lbl">体重</span><span class="num">68.4</span><span class="u">kg</span><span class="goal">目標まで <b>-3.4kg</b></span></div><div class="bmrow"><span class="lbl">体脂肪</span><span class="num">18.2</span><span class="u">%</span><span class="goal">目標まで <b>-3.2%</b></span></div>${rec}</div>`;
 if(s==2)return `<div class="card" style="padding:12px 13px">${head}<div style="display:flex;gap:8px"><div style="flex:1;text-align:center;background:#f8f9fa;border:1px solid #eee4d4;border-radius:11px;padding:9px"><div style="font-size:9px;color:#a59b8c;font-weight:700">体重</div><div><span style="font-size:24px;font-weight:800;color:#34603f">68.4</span><span class="u">kg</span></div><div style="font-size:9.5px;color:#c2693f;font-weight:700">目標まで -3.4</div></div><div style="flex:1;text-align:center;background:#f8f9fa;border:1px solid #eee4d4;border-radius:11px;padding:9px"><div style="font-size:9px;color:#a59b8c;font-weight:700">体脂肪</div><div><span style="font-size:24px;font-weight:800;color:#34603f">18.2</span><span class="u">%</span></div><div style="font-size:9.5px;color:#c2693f;font-weight:700">目標まで -3.2</div></div></div>${rec}</div>`;
 if(s==3)return `<div class="card" style="padding:12px 13px">${head}<div style="display:flex;align-items:flex-end;gap:12px"><div><span style="font-size:42px;font-weight:800;color:#34603f;line-height:1">68.4</span><span class="u">kg</span></div><div style="font-size:12px;color:#6a6256;padding-bottom:3px">体脂肪 <b style="color:#34603f">18.2%</b></div></div><div style="font-size:11.5px;color:#6a6256;margin-top:7px">目標まで <b style="color:#c2693f">体重-3.4kg</b> ・ <b style="color:#c2693f">体脂肪-3.2%</b></div>${rec}</div>`;
 if(s==4)return `<div class="card" style="padding:12px 13px">${head}<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:11px;align-items:baseline"><span><b style="font-size:17px;color:#34603f">68.4</b>kg <span style="color:#a59b8c">／目標65.0</span></span><span style="color:#c2693f;font-weight:700">あと-3.4</span></div><div class="pb" style="margin:5px 0 0"><div class="pf" style="width:72%"></div></div></div><div><div style="display:flex;justify-content:space-between;font-size:11px;align-items:baseline"><span><b style="font-size:17px;color:#34603f">18.2</b>% <span style="color:#a59b8c">／目標15.0</span></span><span style="color:#c2693f;font-weight:700">あと-3.2</span></div><div class="pb" style="margin:5px 0 0"><div class="pf" style="width:60%"></div></div></div>${rec}</div>`;
 return `<div class="card" style="padding:11px 13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="cap">今のからだ</span><span style="font-size:15px;font-weight:800;color:#34603f">68.4<span class="u" style="font-size:9px">kg</span></span><span class="bmmini g">-3.4</span><span style="font-size:15px;font-weight:800;color:#34603f">18.2<span class="u" style="font-size:9px">%</span></span><span class="bmmini g">-3.2</span><span style="margin-left:auto;font-size:10px;color:#4a875b;font-weight:700">記録 →</span></div>`;
};
const bmMini=`<div class="card" style="padding:11px 13px;flex:1"><span class="cap">今のからだ</span><div class="bmmini" style="margin-top:6px"><div><span class="n">68.4</span><span class="u" style="font-size:9px">kg</span> <span class="g">-3.4</span></div><div><span class="n">18.2</span><span class="u" style="font-size:9px">%</span> <span class="g">-3.2</span></div></div></div>`;
const train=`<div class="card train slim"><span class="cap" style="color:#a5631f">今日のトレーニング ・ 3日目</span><div class="t1" style="margin-top:2px">胸・背中の日</div><div class="gobtn" style="color:#34603f">▶ 実施を記録する →</div></div>`;
const trainMini=`<div class="card train slim" style="flex:1"><span class="cap" style="color:#a5631f">今日のトレ・3日目</span><div class="t1" style="font-size:12.5px;margin-top:2px">胸・背中</div><div class="gobtn" style="color:#34603f">▶ 記録</div></div>`;

'大タイル':()=>HD+`<div class="body">${GREET}${board()}${bm()}${train}${cont()}${prog()}<div class="grid">${ALL.map(k=>tile(k,'big')).join('')}</div></div>`,
'リスト':()=>HD+`<div class="body">${GREET}${board()}${bm()}${train}${cont()}${prog()}<div class="sec">メニュー</div>${rows(ALL)}</div>`,
'★統合':()=>HD+`<div class="body">${GREET}${alertBar}${board()}<div class="sec">今日の3つ</div>${bm()}${train}${foodSection()}${cont()}${prog()}<div class="sec">よく使う</div>${grid(['course','learn'])}<div class="more">すべての機能 ▾（ツール・月次・チャット・フォーム・プロテイン・目標）</div></div>`,
'今日特化(実行)':()=>HD+`<div class="body">${GREET}${board()}<div class="sec">今日のミッション</div><div class="card">${chk(true,'体組成を記録','完了 ・ 68.4kg')}${chk(false,'今日のトレーニング (3日目)','胸・背中の日 ▶')}${chk(false,'食事を投稿','朝・昼・夜の写真 ＋')}</div>${cont()}<div class="more">コース・学び・設定はこちら ▾</div></div>`,
'ストリーク前面':()=>HD+`<div class="body">${GREET}${streakCard}${board()}<div class="sec">今日の3つ</div>${bm()}${train}${foodSection()}${prog()}<div class="more">すべての機能 ▾</div></div>`,
};

const ST={pat:'大タイル',bm:3,food:1,col:3,prog:3,board:1,icon:'color'};
const pats=document.getElementById('pats');
Object.keys(PATS).forEach(k=>{const b=document.createElement('button');b.className='pat';b.textContent=k;b.onclick=()=>{ST.pat=k;render();};b.dataset.k=k;pats.appendChild(b);});
function chips(id,key){const el=document.getElementById(id);['1','2','3','4','5'].forEach(n=>{const c=document.createElement('span');c.className='chip';c.textContent=n;c.dataset.v=n;c.onclick=()=>{ST[key]=+n;render();};el.appendChild(c);});}
chips('bms','bm');chips('cols','col');chips('progs','prog');chips('boards','board');
const iconsEl=document.getElementById('icons');
[['line','線画(単色)'],['color','カラー']].forEach(([v,l])=>{const c=document.createElement('span');c.className='chip';c.textContent=l;c.dataset.v=v;c.onclick=()=>{ST.icon=v;render();};iconsEl.appendChild(c);});
function render(){
  document.getElementById('screen').innerHTML=PATS[ST.pat]();
  document.getElementById('nav').innerHTML = ST.pat==='下ナビ再編' ? NAV_ALT : NAV_STD;
  document.querySelectorAll('#pats .pat').forEach(b=>b.classList.toggle('on',b.dataset.k===ST.pat));
  [['bms','bm'],['cols','col'],['progs','prog'],['boards','board']].forEach(([id,k])=>document.querySelectorAll('#'+id+' .chip').forEach(c=>c.classList.toggle('on',+c.dataset.v===ST[k])));
  document.querySelectorAll('#icons .chip').forEach(c=>c.classList.toggle('on',c.dataset.v===ST.icon));
}

// ===== タブ (ホーム画面 / 食事添削セクション) =====
const FOOD_NAMES=['大カード','バーンフィット風','写真サムネ','PFC強調','添削往復'];
const FOOD_DETAIL_NAMES=['MyFitnessPal風（ドーナツ＋PFC）','カロリーバー＋PFC'];
const BODY_NAMES=['MyFitnessPal風（カード＋写真）','推移グラフ重視','ビフォーアフター'];
const NUM='①②③④⑤';
function frame(label,inner){return `<div><div class="ff-label">${label}</div><div class="ff">${inner}</div></div>`;}
function renderFood(){
  let h='<div class="ff-sec">ホーム上の食事カード</div>';
  h+=[1,2,3,4,5].map(n=>frame(NUM[n-1],`${HD}<div class="body">${foodSection(n)}</div>`)).join('');
  h+='<div class="ff-sec">遷移先：食事の詳細画面</div>';
  h+=[1,2].map(n=>frame(NUM[n-1],foodDetail(n))).join('');
  document.getElementById('foodwrap').innerHTML=h;
}
function renderBody(){
  document.getElementById('bodywrap').innerHTML=[1,2,3].map(n=>frame(NUM[n-1],bodyDetail(n))).join('');
}
function setTab(t){
  document.getElementById('homeview').style.display = t==='home'?'':'none';
  document.getElementById('foodview').style.display = t==='food'?'':'none';
  document.getElementById('bodyview').style.display = t==='body'?'':'none';
  document.querySelectorAll('.tabbar .tb').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  if(t==='food') renderFood();
  if(t==='body') renderBody();
}

render();
</script>
